<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conjoyn — Light Mode Icon</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;
  }
  .pane{flex:1 1 360px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;padding:60px 24px}
  .dark{background:#0b0e14;color:#eef1f6}
  .light{background:#eef1f7;color:#1b2233}
  .kicker{font-size:11px;font-weight:650;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
  .hero img{width:240px;height:240px;display:block}
  .dark .hero img{filter:drop-shadow(0 30px 50px rgba(0,0,0,.5))}
  .light .hero img{filter:drop-shadow(0 24px 44px rgba(58,68,92,.28))}
  .ramp{display:flex;align-items:flex-end;gap:24px}
  .ramp .u{display:flex;flex-direction:column;align-items:center;gap:9px}
  .ramp img{display:block}
  .ramp span{font-size:11px;opacity:.5;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="pane dark">
    <div class="kicker">Dark · original</div>
    <div class="hero"><img src="Conjoyn-Icon-Master.svg" alt="dark icon" /></div>
    <div class="ramp">
      <div class="u"><img src="Conjoyn-Icon-Master.svg" width="64" height="64" alt="" /><span>64</span></div>
      <div class="u"><img src="Conjoyn-Icon-Master.svg" width="32" height="32" alt="" /><span>32</span></div>
      <div class="u"><img src="Conjoyn-Icon-Master.svg" width="16" height="16" alt="" /><span>16</span></div>
    </div>
  </div>
  <div class="pane light">
    <div class="kicker">Light · reverse</div>
    <div class="hero"><img src="Conjoyn-Icon-Master-Light.svg" alt="light icon" /></div>
    <div class="ramp">
      <div class="u"><img src="Conjoyn-Icon-Master-Light.svg" width="64" height="64" alt="" /><span>64</span></div>
      <div class="u"><img src="Conjoyn-Icon-Master-Light.svg" width="32" height="32" alt="" /><span>32</span></div>
      <div class="u"><img src="Conjoyn-Icon-Master-Light.svg" width="16" height="16" alt="" /><span>16</span></div>
    </div>
  </div>
</body>
</html>
