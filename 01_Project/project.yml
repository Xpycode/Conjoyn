name: Conjoyn
# Source of truth for the Xcode project. After editing this file, regenerate with:
#   cd 01_Project && xcodegen generate
options:
  bundleIdPrefix: com.lucesumbrarum
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: FDMSRXXN73
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"        # was 1.0/100 (never distributed); 1.0.1 fixes the feedback sheet
    CURRENT_PROJECT_VERSION: "101"    # monotonic integer == sparkle:version; grows 100→101→…
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  HelpMenu:
    path: HelpMenu
  swift-timecode:
    url: https://github.com/orchetect/swift-timecode
    from: "3.1.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
  # AppCitizenshipKit bundles Feedback (re-exports FeedbackKit) + Tip Jar + About behind one config.
  AppCitizenshipKit:
    url: https://github.com/Xpycode/AppCitizenshipKit
    from: "0.1.2"

targets:
  Conjoyn:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    dependencies:
      - package: HelpMenu
        product: HelpMenu
      - package: swift-timecode
        product: SwiftTimecodeCore
      - package: swift-timecode
        product: SwiftTimecodeUI
      - package: Sparkle
      - package: AppCitizenshipKit
    sources:
      - path: Conjoyn
        excludes:
          - "Resources/Helpers/**"   # bundled binaries are copied + signed by a build phase, not compiled
    settings:
      base:
        # Binary/module/.app are PascalCase "Conjoyn" (keeps TEST_HOST + `import Conjoyn` clean);
        # the *visible* brand is lowercase "conjoyn" via CFBundleDisplayName below — that is what the
        # menu bar, Finder, and About box show. The .app filename is never surfaced to end users.
        PRODUCT_NAME: Conjoyn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.lucesumbrarum.conjoyn
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Direct-distribution profile: sandbox OFF, hardened runtime ON (FFmpeg => MAS out of scope)
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_ENTITLEMENTS: Conjoyn/Conjoyn.entitlements
        GENERATE_INFOPLIST_FILE: YES
        # Base plist holds the one key the INFOPLIST_KEY_* mechanism can't inject:
        # UIDesignRequiresCompatibility (opts the whole app out of macOS 26 Tahoe Liquid Glass so the
        # native toolbar renders flat — no glass "bubbles" — matching the bespoke dark theme and the
        # sibling apps Penumbra/CropBatch). Xcode merges the generated INFOPLIST_KEY_* values on top.
        INFOPLIST_FILE: Conjoyn/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: conjoyn
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.video"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Bundles FFmpeg (LGPL static build). See ACKNOWLEDGEMENTS."
        COMBINE_HIDPI_IMAGES: YES
    postBuildScripts:
      - name: "Bundle & sign FFmpeg helpers"
        # Inside-out signing: this runs before Xcode's final app code-sign, so the helpers
        # are signed first, then the app wrapper is signed over them.
        script: '"${SRCROOT}/scripts/sign-bundled-binaries.sh"'
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - ConjoynTests
      gatherCoverageData: false

  ConjoynTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ConjoynTests
    dependencies:
      - target: Conjoyn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucesumbrarum.conjoyn.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
